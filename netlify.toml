[build]
  publish = "."

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/.well-known/assetlinks.json"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
