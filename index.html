<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7e52ab">
    <title>Poshan Pro Master</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- App Manifest for PWA Native Install -->
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-view { animation: fadeIn 0.4s ease-out forwards; }
        /* Professional CSS Blend Layer to merge PNG background with parent container color */
        .blend-multiply { mix-blend-mode: multiply; }
    </style>

    <!-- Cloudflare CDNs for Ultra Stability -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    
    <!-- Standard Firebase SDK Compat CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 select-none">
    
    <!-- FIX: Configured native block identifiers for CloudCannon editor mapping hooks -->
    <div id="root" class="cloudcannon-editable" data-cms-bind="app"></div>
    <div id="recaptcha-container"></div>

    <script>
      // Dependency Note: Run 'npm install @cloudcannon/editable-regions' in environment setup if utilizing node modules build flow.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Service Worker Registered!', reg);
              if ('sync' in navigator) {
                return reg.sync.register('sync-family-data')
                  .then(() => console.log('Background Sync Channel Configured Successfully!'))
                  .catch(err => console.log('Background Sync Channel Registration Failed:', err));
              }
            })
            .catch(err => console.log('Service Worker Failed!', err));
        });
      }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- STANDARD NAVIGATION ICONS ---
        const Icons = {
            User: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Plus: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" cy="5" x2="12" y2="19"/><line x1="5" cy="12" x2="19" y2="12"/></svg>,
            Phone: ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.27-2.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 .82 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
            ArrowLeft: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Shield: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" cy="21" x2="16.65" y2="16.65"/></svg>,
            LogOut: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" cy="12" x2="9" y2="12"/></svg>,
            Google: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>,
            ChevronRight: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            Lock: () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            CheckCircle: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            CallLogo: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.27-2.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 .82 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        };

        const safeLocalStorage = {
            getItem: (key) => { try { return localStorage.getItem(key); } catch (e) { return null; } },
            setItem: (key, value) => { try { localStorage.setItem(key, value); } catch (e) { } },
            removeItem: (key) => { try { localStorage.removeItem(key); } catch (e) { } }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCAxRX_R0KSFsDdU3oUmQgG8JwYZ6edg4k",
            authDomain: "poshanpro-7816d.firebaseapp.com",
            projectId: "poshanpro-7816d",
            storageBucket: "poshanpro-7816d.firebasestorage.app",
            messagingSenderId: "454892989088",
            appId: "1:454892989088:web:6b6c2b03691c7f424a37c5",
            measurementId: "G-9PK4W4424C"
        };

        let auth, db;
        try {
            if (typeof firebase !== 'undefined') {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                auth = firebase.auth(); db = firebase.firestore();
                auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            }
        } catch (e) { }

        const appId = "poshan-pro-restore-v1";

        const CompactLabel = ({ children, required = true }) => (
            <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1 block mb-1.5 italic leading-none">
                {children} {required && <span className="text-red-500 font-bold">*</span>}
            </label>
        );

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [isGuest, setIsGuest] = useState(false);
            const [members, setMembers] = useState([]);
            const [viewingHead, setViewingHead] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const fileInputRef = useRef(null);

            const [loginTab, setLoginTab] = useState('userpass'); 
            const [isSignUp, setIsSignUp] = useState(false); 
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [isBtnLoading, setIsBtnLoading] = useState(false);
            const [confirmResult, setConfirmResult] = useState(null);

            const initialForm = {
                firstName: '', lastName: '', gender: 'Male', birthDate: '', 
                mobile: '', aadhaar: '', photoURL: '', 
                poribarNo: '', relationToHead: 'Self', isFamilyHead: false, headId: ''
            };
            const [formData, setFormData] = useState(initialForm);

            useEffect(() => {
                if (!auth) { setIsGuest(true); setView('dashboard'); return; }
                auth.getRedirectResult().then(res => {
                    if (res && res.user) { setUser(res.user); setIsGuest(false); setView('dashboard'); }
                }).catch(e => {});

                const unsub = auth.onAuthStateChanged(u => {
                    if (u) { 
                        setUser(u); 
                        setIsGuest(false); 
                        setView('dashboard'); 
                    } else {
                        if (safeLocalStorage.getItem('poshan_is_guest') === 'true') { 
                            setIsGuest(true); 
                            setView('dashboard'); 
                        } else { 
                            setView('login'); 
                        }
                    }
                }, err => { setView('login'); });
                return () => { if (unsub) unsub(); };
            }, []);

            const loadLocalDataFallback = () => {
                const cached = safeLocalStorage.getItem('poshan_local_registry_members');
                if (cached) { try { setMembers(JSON.parse(cached)); } catch(e) { setMembers([]); } } else { setMembers([]); }
            };

            const saveLocalData = (newMembers) => {
                safeLocalStorage.setItem('poshan_local_registry_members', JSON.stringify(newMembers));
                setMembers(newMembers);
            };

            useEffect(() => {
                if (user && !isGuest && db) {
                    try {
                        const col = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('members');
                        return col.onSnapshot(snap => { 
                            const remoteData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                            setMembers(remoteData);
                            safeLocalStorage.setItem('poshan_local_registry_members', JSON.stringify(remoteData));
                        }, err => { 
                            loadLocalDataFallback(); 
                        });
                    } catch(e) { 
                        loadLocalDataFallback(); 
                    }
                } else { 
                    loadLocalDataFallback(); 
                }
            }, [user, isGuest]);

            useEffect(() => {
                if (viewingHead) { const freshHead = members.find(m => m.id === viewingHead.id); if (freshHead) setViewingHead(freshHead); }
            }, [members]);

            const handleUserPassAuth = async (e) => {
                e.preventDefault();
                if (!username.trim() || password.length < 6 || isBtnLoading || !auth) return;
                setIsBtnLoading(true);
                const email = username.trim().toLowerCase().includes('@') ? username.trim().toLowerCase() : `${username.trim().toLowerCase()}@poshanpro.com`;
                try {
                    if (isSignUp) { await auth.createUserWithEmailAndPassword(email, password); alert("Account Registry Success!"); } else { await auth.signInWithEmailAndPassword(email, password); }
                    setIsGuest(false);
                } catch (err) { alert("Error: " + err.message); } finally { setIsBtnLoading(false); }
            };

            const handleGoogleLogin = async () => {
                if (!auth || isBtnLoading) return; setIsBtnLoading(true);
                try { await auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); } catch (e) { setIsBtnLoading(false); }
            };

            const sendOTP = async () => {
                if (!auth || phone.length < 10 || isBtnLoading) return; setIsBtnLoading(true);
                try {
                    if (window.recaptchaVerifier) window.recaptchaVerifier.clear();
                    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
                    const result = await auth.signInWithPhoneNumber("+91" + phone, window.recaptchaVerifier);
                    setConfirmResult(result); setOtpSent(true);
                } catch (e) { alert("OTP Error."); } finally { setIsBtnLoading(false); }
            };

            const verifyOTP = async () => {
                if (otp.length < 6 || isBtnLoading) return; setIsBtnLoading(true);
                try { await confirmResult.confirm(otp); setIsGuest(false); } catch (e) { alert("Invalid Code!"); } finally { setIsBtnLoading(false); }
            };

            const skipLogin = () => { safeLocalStorage.setItem('poshan_is_guest', 'true'); setIsGuest(true); setView('dashboard'); };
            const handleLogout = () => {
                if (confirm("Logout?")) {
                    if (auth) auth.signOut().catch(e => {});
                    safeLocalStorage.removeItem('poshan_is_guest'); 
                    setIsGuest(false); 
                    setUser(null); 
                    setView('login');
                }
            };

            const stats = useMemo(() => [
                { l: 'Families', v: members.filter(x => x.isFamilyHead).length, c: 'bg-amber-500', img: '/assets/p.png', bc: 'border-amber-600/20' },
                { l: 'Members', v: members.length, c: 'bg-indigo-200', img: '/assets/fa.png', bc: 'border-indigo-300/30' },
                { l: 'Female', v: members.filter(x => x.gender === 'Female').length, c: 'bg-rose-200', img: '/assets/f.png', bc: 'border-rose-300/30' },
                { l: 'Male', v: members.filter(x => x.gender === 'Male').length, c: 'bg-sky-200', img: '/assets/m.png', bc: 'border-sky-300/30' },
                { l: 'Girl', v: members.filter(x => x.gender === 'Girl').length, c: 'bg-pink-200', img: '/assets/g.png', bc: 'border-pink-300/30' },
                { l: 'Boy', v: members.filter(x => x.gender === 'Boy').length, c: 'bg-cyan-200', img: '/assets/b.png', bc: 'border-cyan-300/30' }
            ], [members]);

            const ageDisplay = useMemo(() => {
                if (!formData.birthDate || formData.birthDate.length < 10) return '';
                const parts = formData.birthDate.split('/'); if (parts.length !== 3) return '';
                const [d, m, y] = parts.map(Number); const bDate = new Date(y, m-1, d); const today = new Date();
                if (isNaN(bDate.getTime())) return '';
                let years = today.getFullYear() - bDate.getFullYear(); let months = today.getMonth() - bDate.getMonth();
                if (months < 0 || (months === 0 && today.getDate() < bDate.getDate())) { years--; months += 12; }
                return `${years.toString().padStart(2, '0')}-${months.toString().padStart(2, '0')}`;
            }, [formData.birthDate]);

            const relationOptions = useMemo(() => {
                if (!viewingHead) return ['Wife', 'Husband', 'Boy', 'Girl', 'Mother', 'Father', 'Mother in Law', 'Father in Law', 'Other'];
                let rawList = viewingHead.gender === 'Male' ? 
                    ['Wife', 'Boy', 'Girl', 'Mother', 'Father', 'Mother in Law', 'Father in Law', 'Other'] : 
                    ['Husband', 'Boy', 'Girl', 'Mother', 'Father', 'Mother in Law', 'Father in Law', 'Other'];
                const houseRels = members.filter(m => m.headId === viewingHead.id && !m.isFamilyHead).map(m => m.relationToHead);
                return rawList.filter(r => {
                    const singles = ['Wife', 'Husband', 'Mother', 'Father', 'Mother in Law', 'Father in Law'];
                    if (singles.includes(r) && houseRels.includes(r)) return false; return true;
                });
            }, [viewingHead, members]);

            const globalSearchResults = useMemo(() => {
                if (!searchTerm.trim()) return [];
                const query = searchTerm.toLowerCase().trim();
                return members.filter(m => `${m.firstName} ${m.lastName}`.toLowerCase().includes(query) || m.poribarNo?.toLowerCase().includes(query));
            }, [searchTerm, members]);

            const handleSave = async () => {
                if (isSaving) return; 
                setIsSaving(true);
                const data = { ...formData, age: ageDisplay, updatedAt: Date.now() };

                if (user && !isGuest && db) {
                    try {
                        const col = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('members');
                        if (editingId) { 
                            await col.doc(editingId).update(data); 
                        } else { 
                            await col.add({...data, createdAt: Date.now()}); 
                        }
                        
                        const wasHead = data.isFamilyHead;
                        setEditingId(null); 
                        setFormData(initialForm); 
                        setIsSaving(false);
                        
                        if (wasHead) {
                            setView('addHeadDashboard');
                        } else {
                            setView('household');
                        }
                    } catch (e) { 
                        alert("Database error. Local saved."); 
                        setIsSaving(false);
                    }
                } else {
                    let localMembers = [...members];
                    if (editingId) { localMembers = localMembers.map(m => m.id === editingId ? {...m, ...data} : m); } 
                    else { localMembers.push({...data, id: 'local-' + Date.now(), createdAt: Date.now()}); }
                    saveLocalData(localMembers); 
                    
                    const wasHead = data.isFamilyHead;
                    setEditingId(null); 
                    setFormData(initialForm);
                    setIsSaving(false);
                    
                    if (wasHead) setView('addHeadDashboard'); else setView('household');
                }
            };

            const handleDeleteFamily = async (headId) => {
                if (!confirm("Delete family household?")) return;
                if (!isGuest && user && db) {
                    const toDelete = members.filter(m => m.id === headId || m.headId === headId);
                    const batch = db.batch();
                    const dbCol = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('members');
                    toDelete.forEach(item => batch.delete(dbCol.doc(item.id))); await batch.commit();
                } else { saveLocalData(members.filter(m => m.id !== headId && m.headId !== headId)); }
                setView('addHeadDashboard');
            };

            const handleDeleteMember = async (targetId) => {
                if (!confirm("Delete member?")) return;
                if (!isGuest && user && db) { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('members').doc(targetId).delete(); } 
                else { saveLocalData(members.filter(m => m.id !== targetId)); }
            };

            const filteredHeads = members.filter(m => m.isFamilyHead).filter(h => `${h.firstName} ${h.lastName}`.toLowerCase().includes(searchTerm.toLowerCase()) || h.poribarNo?.includes(searchTerm));

            if (view === 'login') return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 animate-view">
                    <div className="w-full max-w-sm bg-white p-8 rounded-[48px] shadow-2xl text-center space-y-6 border-b-8 border-indigo-100 leading-none">
                        <div className="mx-auto w-16 h-16 bg-indigo-700 text-white rounded-[22px] flex items-center justify-center shadow-xl rotate-3 text-2xl font-black italic">P</div>
                        <div>
                            <h2 className="text-2xl font-black italic tracking-tighter text-indigo-700 uppercase">Poshan Pro</h2>
                            <p className="text-slate-400 text-[10px] font-bold uppercase mt-1 tracking-widest leading-none">Family Registry</p>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-2xl gap-1 text-[10px] font-bold">
                            <button onClick={() => setLoginTab('userpass')} className={`flex-1 py-3 rounded-xl uppercase transition-all ${loginTab === 'userpass' ? 'bg-indigo-700 text-white shadow-md' : 'text-slate-500'}`}>User/Pass</button>
                            <button onClick={() => setLoginTab('otp')} className={`flex-1 py-3 rounded-xl uppercase transition-all ${loginTab === 'otp' ? 'bg-indigo-700 text-white shadow-md' : 'text-slate-500'}`}>OTP</button>
                            <button onClick={() => setLoginTab('google')} className={`flex-1 py-3 rounded-xl uppercase transition-all ${loginTab === 'google' ? 'bg-indigo-700 text-white shadow-md' : 'text-slate-500'}`}>Google</button>
                        </div>
                        <div className="space-y-4">
                            {loginTab === 'userpass' && (
                                <form onSubmit={handleUserPassAuth} className="space-y-3">
                                    <input type="text" placeholder="Username" className="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold outline-none text-sm" value={username} onChange={e => setUsername(e.target.value)} required />
                                    <input type="password" placeholder="Password (Min 6)" className="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold outline-none text-sm" value={password} onChange={e => setPassword(e.target.value)} required />
                                    <button type="submit" className="w-full py-4 bg-indigo-700 text-white rounded-2xl font-black uppercase text-xs tracking-wider shadow-md">{isBtnLoading ? "Processing..." : (isSignUp ? "Sign Up" : "Login Now")}</button>
                                    <button type="button" onClick={() => setIsSignUp(!isSignUp)} className="text-[10px] font-bold text-indigo-600 uppercase underline block mx-auto mt-2">{isSignUp ? "Have account? Log In" : "New user? Sign Up"}</button>
                                </form>
                            )}
                            {loginTab === 'otp' && (
                                <div className="space-y-3">
                                    {!otpSent ? (
                                        <div className="space-y-3">
                                            <div className="relative">
                                                <div className="absolute left-5 top-1/2 -translate-y-1/2 font-bold text-slate-400 border-r pr-3">+91</div>
                                                <input placeholder="Mobile Number" className="w-full p-4 pl-16 border-2 border-slate-100 rounded-2xl font-bold outline-none text-sm" value={phone} onChange={e => setPhone(e.target.value.replace(/\D/g, '').slice(0,10))} inputMode="tel" />
                                            </div>
                                            <button onClick={sendOTP} className="w-full py-4 bg-indigo-700 text-white rounded-2xl font-black uppercase text-xs tracking-wider shadow-md">Send OTP</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            <input placeholder="6-digit OTP" className="w-full p-4 border-2 border-slate-100 rounded-2xl font-black text-center tracking-[0.5em] text-md outline-none" value={otp} onChange={e => setOtp(e.target.value.replace(/\D/g, '').slice(0,6))} inputMode="numeric" />
                                            <button onClick={verifyOTP} className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase text-xs tracking-wider shadow-md">Verify Code</button>
                                        </div>
                                    )}
                                </div>
                            )}
                            {loginTab === 'google' && (
                                <button onClick={handleGoogleLogin} className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl flex items-center justify-center gap-4 font-black uppercase text-xs hover:bg-slate-50"><Icons.Google /> Continue with Gmail</button>
                            )}
                            <div className="flex items-center gap-4 py-1"><div className="h-px flex-1 bg-slate-100"></div><span className="text-[10px] font-black text-slate-300 uppercase">OR</span><div className="h-px flex-1 bg-slate-100"></div></div>
                            <button onClick={skipLogin} className="w-full p-2 text-indigo-600 font-black uppercase text-[11px] tracking-[0.1em]">Skip Login &gt;</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20 bg-gradient-to-b from-[#f43f5e] to-[#e11d48] animate-view">
                    
                    {/* 1. Source Editable Region Hook Injected inside hidden configuration header */}
                    <div className="hidden">
                        <h1 data-editable="source" data-path="/src/pages/index.astro" data-key="title">Hello!</h1>
                    </div>

                    <nav className="sticky top-0 text-white p-4 flex items-center justify-between shadow-xl z-[60]" style={{ backgroundColor: '#4338ca' }}>
                        <div className="flex items-center gap-3">
                            {view !== 'dashboard' && <button onClick={() => {
                                if (view === 'addHeadDashboard') setView('dashboard');
                                else if (view === 'household' || view === 'selectRelation') setView('addHeadDashboard');
                                else if (view === 'form') setView(formData.isFamilyHead ? 'addHeadDashboard' : 'household');
                            }} className="p-1 active:scale-75 transition-transform"><Icons.ArrowLeft /></button>}
                            
                            {/* 2. Text/Author Editable Regions Hook Injected dynamically over core master headers */}
                            <div className="inline-block">
                                <span data-editable="text" data-prop="title" className="text-xl font-black italic uppercase tracking-tighter leading-none">Poshan Pro</span>
                                <span className="hidden">By: <span data-editable="text" data-prop="author">Master Admin</span></span>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={handleLogout} className="p-2 bg-white/10 rounded-full active:bg-white/20 transition-colors"><Icons.LogOut /></button>
                            <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center border border-white/30 overflow-hidden shadow-inner font-bold uppercase text-[10px]">
                                {user?.photoURL ? <img src={user.photoURL} className="w-full h-full object-cover" /> : (isGuest ? 'G' : <Icons.User s={22}/>)}
                            </div>
                        </div>
                    </nav>

                    <div className="max-w-md mx-auto space-y-6">
                        {view === 'dashboard' && (
                            <div className="animate-view p-4 space-y-5">
                                
                                {/* 4. Array and Testimonials Structure Mapping Hook wrapper embedded contextually */}
                                <div className="hidden" data-editable="array" data-prop="testimonials">
                                    <ul>
                                        <li data-editable="array-item">
                                            <h4>System Status</h4>
                                            <p>Active Integration Channels verified successfully.</p>
                                        </li>
                                    </ul>
                                </div>

                                {/* Grid container for Premium Local Assets Cards */}
                                <div className="grid grid-cols-2 gap-3">
                                    {stats.map((s, i) => (
                                        <div key={i} className={`${s.c} h-[85px] rounded-[32px] shadow-lg flex items-center overflow-hidden active:scale-95 transition-all border-b-4 border-black/10`}>
                                            <div className="flex-1 text-center flex flex-col justify-center items-center pl-2">
                                                <p className="text-[10px] font-black text-slate-700 uppercase tracking-tight mb-0.5 leading-none">{s.l}</p>
                                                <p className="text-3xl font-black text-slate-900 leading-none">{s.v}</p>
                                            </div>
                                            <div className={`h-full border-r-2 ${s.bc}`}></div>
                                            <div className="w-[75px] h-full flex items-center justify-center overflow-hidden">
                                                <img src={s.img} alt={s.l} className="w-full h-full object-contain blend-multiply" />
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* White Bottom Panel matching image layout */}
                                <div className="bg-white rounded-[44px] p-5 shadow-2xl border-4 border-rose-600/20 space-y-5 mt-4">
                                    
                                    {/* View Family Heads Button re-aligned to display Full body image on Left like prompt sample */}
                                    <button onClick={() => setView('addHeadDashboard')} className="w-full h-[105px] bg-gradient-to-r from-[#2e0854] via-[#4c054a] to-[#9f0546] rounded-[32px] flex items-center justify-between pl-4 pr-4 text-white font-black uppercase tracking-wide active:scale-95 shadow-xl border-b-4 border-black/30 relative overflow-hidden">
                                        <div className="flex items-center gap-3 h-full">
                                            
                                            {/* 3. Image Editable Components mapping directly inside layout container */}
                                            <div className="h-full w-[65px] flex items-end justify-center">
                                                <img 
                                                    data-editable="image"
                                                    data-prop-src="heroImage"
                                                    data-prop-alt="imageAlt"
                                                    data-prop-title="imageTitle"
                                                    src="/assets/h.png" 
                                                    alt="Grandpa Full" 
                                                    title="Grandpa Asset Map"
                                                    className="h-full w-full object-contain object-bottom blend-multiply" 
                                                />
                                            </div>
                                            
                                            <div className="flex flex-col text-left leading-tight max-w-[200px]">
                                                <span className="text-sm font-black italic tracking-wide uppercase">View</span>
                                                <span className="text-lg font-black italic tracking-wide uppercase ml-4">Family</span>
                                                <span className="text-lg font-black italic tracking-wide uppercase ml-12">Heads</span>
                                            </div>
                                        </div>
                                        <div className="z-10">
                                            <Icons.ChevronRight />
                                        </div>
                                    </button>

                                    {/* Styled Search Bar with soft Lavender Tint */}
                                    <div className="relative">
                                        <input placeholder="Search Family ID, Head or Member name..." className="w-full p-5 pr-14 bg-[#e8e4f5] border-2 border-transparent rounded-[24px] font-bold shadow-inner outline-none focus:border-purple-300 transition-all text-slate-700 placeholder-slate-400 text-sm" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                        <div className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                                    </div>

                                    {/* Dropdown Live Global Search Container */}
                                    {searchTerm.trim().length > 0 && (
                                        <div className="relative bg-white border border-slate-200 shadow-2xl rounded-[28px] overflow-hidden z-50 p-2 max-h-[300px] overflow-y-auto no-scrollbar animate-view">
                                            {globalSearchResults.length > 0 ? (
                                                globalSearchResults.map(m => {
                                                    const targetHead = m.isFamilyHead ? m : members.find(h => h.id === m.headId);
                                                    return (
                                                        <div key={m.id} onClick={() => { if(targetHead) { setViewingHead(targetHead); setSearchTerm(''); setView('household'); } }} className="flex items-center gap-3 p-3 hover:bg-slate-50 rounded-2xl cursor-pointer active:bg-slate-100 transition-colors border-b border-slate-50 last:border-0">
                                                            <img src={m.photoURL || "https://cdn-icons-png.flaticon.com/512/3063/3063822.png"} className="w-10 h-10 rounded-xl object-cover bg-slate-50 shrink-0" />
                                                            <div className="flex-1 min-w-0">
                                                                <h5 className="font-black text-slate-800 uppercase text-xs truncate">{m.firstName} {m.lastName}</h5>
                                                                <p className="text-[10px] font-bold text-slate-400 uppercase mt-0.5">ID: {m.poribarNo} • <span className={m.isFamilyHead ? 'text-rose-600 font-black' : 'text-indigo-600'}>{m.isFamilyHead ? 'Family Head' : m.relationToHead}</span></p>
                                                            </div>
                                                            <Icons.ChevronRight />
                                                        </div>
                                                    );
                                                })
                                            ) : ( <p className="text-center p-6 text-xs text-slate-400 font-bold uppercase tracking-wider">No Records Found</p> )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'addHeadDashboard' && (
                            <div className="p-4 space-y-4 animate-view">
                                <div className="bg-RED-700 text-white p-6 rounded-[28px] shadow-lg text-center border-b-4 border-indigo-900 font-black italic uppercase text-xl leading-none">Head Management</div>
                                <button onClick={() => {setFormData({...initialForm, isFamilyHead: true, relationToHead: 'Self'}); setEditingId(null); setView('form');}} className="w-full p-6 bg-indigo-700 text-white rounded-[32px] font-black flex items-center justify-center gap-3 active:scale-95 shadow-xl uppercase italic none"><Icons.Plus s={24} /> New Head Registration</button>
                                <div className="space-y-4 pt-2">
                                    {filteredHeads.map(h => (
                                        <div key={h.id} className="bg-white p-4 rounded-[32px] border-b-4 border-slate-200 flex items-center justify-between shadow-sm active:scale-95 transition-all">
                                            <div onClick={() => {setViewingHead(h); setView('household');}} className="flex items-center gap-4 flex-1 min-w-0 cursor-pointer">
                                                <img src={h.photoURL || "https://cdn-icons-png.flaticon.com/512/3063/3063822.png"} className="w-16 h-16 rounded-2xl object-cover bg-slate-100 border-2 shadow-sm" />
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-1.5 mb-1.5 leading-none">
                                                        <span className="text-[9px] font-black bg-indigo-100 text-indigo-700 px-2.5 py-0.5 rounded-lg uppercase tracking-widest">ID: {h.poribarNo}</span>
                                                        <span className="text-[9px] font-black bg-rose-100 text-rose-700 px-2 py-0.5 rounded-lg uppercase italic shadow-sm">Head</span>
                                                    </div>
                                                    <h4 className="font-black uppercase text-slate-800 truncate leading-none text-lg">{h.firstName} {h.lastName}</h4>
                                                    <p className="text-[10px] font-bold text-slate-400 italic mt-1.5 uppercase leading-none">{h.age || '00-00'} OLD</p>
                                                </div>
                                            </div>
                                            {h.mobile && ( <a href={`tel:${h.mobile}`} className="p-4 bg-emerald-500 text-white rounded-2xl shadow-md active:scale-75 transition-transform ml-2 shrink-0 flex items-center justify-center"><Icons.CallLogo s={18} /></a> )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'household' && viewingHead && (
                            <div className="p-4 space-y-6 animate-view">
                                <div className="bg-indigo-700 p-6 rounded-[48px] text-white shadow-2xl relative overflow-hidden">
                                    <div className="flex gap-5 items-start relative z-10 leading-none">
                                        <img src={viewingHead.photoURL || "https://cdn-icons-png.flaticon.com/512/3063/3063822.png"} className="w-24 h-24 rounded-[32px] border-4 border-white/20 object-cover shadow-lg" />
                                        <div className="flex-1">
                                            <p className="text-[11px] font-black opacity-60 uppercase italic mb-2 tracking-widest leading-none">Head Profile</p>
                                            <h3 className="text-3xl font-black uppercase leading-none tracking-tighter">{viewingHead.firstName} {viewingHead.lastName}</h3>
                                            <p className="mt-4 text-xs font-black italic bg-white/10 w-fit px-4 py-1.5 rounded-full uppercase tracking-tighter">ID: {viewingHead.poribarNo}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-3 relative z-10 mt-5 leading-none">
                                        <button onClick={() => {setEditingId(viewingHead.id); setFormData(viewingHead); setView('form');}} className="flex-1 bg-white text-indigo-700 p-4 rounded-[24px] font-black uppercase italic text-xs shadow-sm active:scale-95 transition-transform">Edit Profile</button>
                                        <button onClick={() => handleDeleteFamily(viewingHead.id)} className="bg-rose-500 p-4 rounded-[24px] text-white shadow-sm active:scale-95 transition-all leading-none"><Icons.Trash /></button>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    {members.filter(m => m.headId === viewingHead.id && !m.isFamilyHead).map(m => (
                                        <div key={m.id} className="bg-white p-4 rounded-[32px] border-b-4 border-slate-200 flex items-center gap-4 shadow-sm active:scale-95 transition-all">
                                            <img src={m.photoURL || "https://cdn-icons-png.flaticon.com/512/3063/3063822.png"} className="w-14 h-14 rounded-2xl object-cover border" />
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-2 mb-1.5">
                                                    <p className="text-[10px] font-black text-indigo-500 uppercase italic leading-none">{m.relationToHead}</p>
                                                    {m.mobile && ( <a href={`tel:${m.mobile}`} className="p-1 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center active:scale-75"><Icons.CallLogo s={10} /></a> )}
                                                </div>
                                                <h5 className="font-black uppercase text-base leading-none text-slate-800 truncate">{m.firstName} {m.lastName}</h5>
                                                <p className="text-[10px] font-bold text-slate-400 mt-1.5 uppercase tracking-tighter leading-none">{m.age} • {m.gender}</p>
                                            </div>
                                            <div className="flex items-center gap-1.5 leading-none">
                                                <button onClick={() => {setEditingId(m.id); setFormData(m); setView('form');}} className="p-3 bg-slate-50 text-slate-300 rounded-2xl active:text-indigo-600 transition-colors leading-none"><Icons.Edit /></button>
                                                <button onClick={() => handleDeleteMember(m.id)} className="p-3 bg-rose-50 text-rose-500 rounded-2xl active:text-rose-700 transition-colors leading-none"><Icons.Trash /></button>
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => setView('selectRelation')} className="w-full border-4 border-dashed border-slate-200 p-12 rounded-[48px] flex flex-col items-center text-slate-300 gap-3 bg-white/50 active:bg-slate-100 shadow-inner transition-all leading-none">
                                        <div className="bg-slate-50 p-4 rounded-full border shadow-sm"><Icons.Plus s={32} /></div>
                                        <span className="text-[11px] font-black uppercase italic tracking-widest opacity-60">Add Member to Household</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'selectRelation' && viewingHead && (
                            <div className="p-4 space-y-4 animate-view">
                                <div className="bg-indigo-600 text-white p-5 rounded-[28px] shadow-md text-center font-black italic uppercase text-lg leading-none">Select Relation to Head</div>
                                <div className="grid grid-cols-1 gap-3 pt-2">
                                    {relationOptions.map(rel => (
                                        <button key={rel} onClick={() => {
                                                let targetGender = ['Wife', 'Mother', 'Mother in Law', 'Girl'].includes(rel) ? 'Girl' : 'Boy';
                                                setFormData({ ...initialForm, headId: viewingHead.id, isFamilyHead: false, poribarNo: viewingHead.poribarNo, relationToHead: rel, gender: targetGender });
                                                setView('form');
                                            }} className="w-full p-5 bg-white border-2 border-slate-200 rounded-[24px] text-left font-black uppercase tracking-wider text-slate-700 hover:border-indigo-500 hover:text-indigo-700 transition-all shadow-sm active:scale-95 flex justify-between items-center" >
                                            <span>{rel}</span><Icons.ChevronRight />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'form' && (
                            <div className="p-4 space-y-6 pb-12 animate-view">
                                <div className="flex items-center gap-6 pt-2 leading-none">
                                    <div onClick={() => fileInputRef.current?.click()} className="w-32 h-32 bg-white border-[6px] border-white rounded-[44px] shadow-2xl flex items-center justify-center overflow-hidden relative ring-4 ring-indigo-50 active:scale-95 transition-transform shrink-0">
                                        {formData.photoURL ? <img src={formData.photoURL} className="w-full h-full object-cover" /> : <div className="text-amber-400"><Icons.User s={40} /></div>}
                                        <input type="file" ref={fileInputRef} onChange={(e) => {
                                            const f = e.target.files[0]; if(!f) return;
                                            const r = new FileReader(); r.onload = (ev) => setFormData({...formData, photoURL: ev.target.result}); r.readAsDataURL(f);
                                        }} className="hidden" accept="image/*" />
                                    </div>
                                    <div className="flex-1 space-y-2">
                                        <div className="flex justify-between items-center">
                                            <CompactLabel>Family ID</CompactLabel>
                                            {!formData.isFamilyHead && ( <span className="text-[10px] font-black bg-indigo-100 text-indigo-700 px-2.5 py-1 rounded-full uppercase mb-1.5 tracking-wider italic">{formData.relationToHead}</span> )}
                                        </div>
                                        <input placeholder="Family Code" className="w-full p-5 border-2 border-slate-200 rounded-[24px] font-black outline-none focus:border-indigo-400 shadow-sm leading-none uppercase" value={formData.poribarNo} onChange={e => setFormData({...formData, poribarNo: e.target.value})} disabled={!formData.isFamilyHead} />
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-[40px] border-b-8 border-slate-200 shadow-md space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><CompactLabel>First Name</CompactLabel><input className="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold italic outline-none focus:border-indigo-300 transition-all shadow-sm uppercase" value={formData.firstName} onChange={e => setFormData({...formData, firstName: e.target.value})} /></div>
                                        <div><CompactLabel>Last Name</CompactLabel><input className="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold italic outline-none focus:border-indigo-300 transition-all shadow-sm uppercase" value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} /></div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <CompactLabel>Gender</CompactLabel>
                                            <div className="flex bg-slate-100 p-1.5 rounded-2xl gap-1 shadow-inner leading-none">
                                                {['Boy', 'Girl'].includes(formData.relationToHead) ? (
                                                    ['Boy', 'Girl'].map(g => {
                                                        const isLocked = (formData.relationToHead === 'Boy' && g === 'Girl') || (formData.relationToHead === 'Girl' && g === 'Boy');
                                                        return (
                                                            <button key={g} type="button" disabled={isLocked} onClick={() => setFormData({...formData, gender: g})} className={`flex-1 py-4 rounded-xl font-black text-[10px] uppercase transition-all ${isLocked ? 'opacity-20 cursor-not-allowed bg-slate-200 text-slate-400' : ''} ${formData.gender === g ? 'bg-indigo-700 text-white shadow-lg font-bold' : 'text-slate-400 opacity-60 font-bold'}`}>{g}</button>
                                                        );
                                                    })
                                                ) : (
                                                    ['Male', 'Female'].map(g => {
                                                        const isLocked = !formData.isFamilyHead && (
                                                            (['Wife', 'Mother', 'Mother in Law'].includes(formData.relationToHead) && g === 'Male') ||
                                                            (['Husband', 'Father', 'Father in Law'].includes(formData.relationToHead) && g === 'Female')
                                                        );
                                                        return (
                                                            <button key={g} type="button" disabled={isLocked} onClick={() => setFormData({...formData, gender: g})} className={`flex-1 py-4 rounded-xl font-black text-[10px] uppercase transition-all ${isLocked ? 'opacity-20 cursor-not-allowed bg-slate-200 text-slate-400' : ''} ${formData.gender === g ? 'bg-indigo-700 text-white shadow-lg font-bold' : 'text-slate-400 opacity-60 font-bold'}`}>{g}</button>
                                                        );
                                                    })
                                                )}
                                            </div>
                                        </div>
                                        <div className="relative leading-none">
                                            <CompactLabel>Birth Date</CompactLabel>
                                            <input placeholder="DD/MM/YYYY" className="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold shadow-sm outline-none" value={formData.birthDate} onChange={e => {
                                                    let val = e.target.value.replace(/\D/g, ''); let len = val.length;
                                                    if (len >= 2) { let dd = parseInt(val.slice(0, 2)); if (dd > 31 || dd === 0) return; }
                                                    if (len >= 4) { let mm = parseInt(val.slice(2, 4)); if (mm > 12 || mm === 0) return; }
                                                    if (len === 8) { let yyyy = parseInt(val.slice(4, 8)); if (yyyy > 2026) return; }
                                                    if (len > 8) val = val.slice(0, 8);
                                                    let formatted = len <= 2 ? val : len <= 4 ? `${val.slice(0, 2)}/${val.slice(2)}` : `${val.slice(0, 2)}/${val.slice(2, 4)}/${val.slice(4, 8)}`;
                                                    setFormData({...formData, birthDate: formatted});
                                                }} inputMode="numeric" maxLength={10} />
                                            {ageDisplay && <div className="absolute -bottom-5 right-2 text-[10px] font-black text-emerald-600 bg-white px-2.5 py-1 rounded-full border shadow-sm z-10 animate-bounce italic leading-none shadow-emerald-50">Age: {ageDisplay}</div>}
                                        </div>
                                    </div>

                                    <div className="space-y-4 pt-2 leading-none">
                                        <div className="relative">
                                            <CompactLabel required={false}>Mobile</CompactLabel>
                                            <div className="relative flex items-center">
                                                <input className="w-full p-4 pr-12 border-2 border-slate-100 rounded-2xl font-bold outline-none shadow-sm" value={formData.mobile} onChange={e => setFormData({...formData, mobile: e.target.value.replace(/\D/g,'')})} maxLength={10} inputMode="tel" />
                                                {formData.mobile.length === 10 && ( <div className="absolute right-4 animate-view"><Icons.CheckCircle /></div> )}
                                            </div>
                                        </div>
                                        <div className="relative">
                                            {/* Note: In compliance with technical guidelines, Aadhaar entry structure remains preserved inside data fields placeholder without modification loops. */}
                                            <CompactLabel required={false}>Aadhaar</CompactLabel>
                                            <div className="relative flex items-center">
                                                <input className="w-full p-4 pr-12 border-2 border-slate-100 rounded-2xl font-bold outline-none shadow-sm" value={formData.aadhaar} onChange={e => setFormData({...formData, aadhaar: e.target.value.replace(/\D/g,'')})} maxLength={12} inputMode="numeric" />
                                                {formData.aadhaar.length === 12 && ( <div className="absolute right-4 animate-view"><Icons.CheckCircle /></div> )}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={handleSave} disabled={isSaving} className="w-full py-6 bg-indigo-700 text-white rounded-[32px] font-black italic text-2xl shadow-2xl active:scale-95 border-b-8 border-indigo-900 mt-6 shadow-indigo-100 uppercase tracking-tighter transition-all leading-none">{isSaving ? "SYNCING..." : "SAVE & SYNC"}</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
