<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ac5ebd">
    <title>Poshan Pro Master</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- App Manifest for PWA Native Install -->
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-view { animation: fadeIn 0.4s ease-out forwards; }
    </style>

    <!-- Cloudflare CDNs for Ultra Stability -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    
    <!-- Standard Firebase SDK Compat CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 select-none">
    <div id="root"></div>
    <div id="recaptcha-container"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- STANDARD NAVIGATION ICONS ---
        const Icons = {
            User: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Plus: ({s=18, className=""}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" cy="5" x2="12" y2="19"/><line x1="5" cy="12" x2="19" y2="12"/></svg>,
            Phone: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.27-2.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 .82 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
            ArrowLeft: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            CurvedBack: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" cy="21" x2="16.65" y2="16.65"/></svg>,
            LogOut: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" cy="12" x2="9" y2="12"/></svg>,
            Google: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>,
            ChevronRight: ({className=""}) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>,
            CheckCircle: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            CallLogo: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.27-2.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 .82 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
            Settings: ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Export: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
            Refresh: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
            FormImagePlaceholder: () => (
                <svg width="55" height="55" viewBox="0 0 24 24" fill="none" stroke="#f4b772" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="8" cy="9" r="3"/>
                    <path d="M4 19c0-2.5 3-4 4-4s4 1.5 4 4"/>
                    <rect x="12" y="5" width="10" height="10" rx="2"/>
                    <path d="M12 11l2-2 3 3"/>
                    <path d="M17 19v-5"/>
                    <path d="M15 16l2-2 2 2"/>
                </svg>
            )
        };

        const BeneficiaryCard = ({ title, count, imgSrc }) => (
            <div className="bg-white rounded-[24px] p-3.5 flex flex-col justify-between h-[155px] relative shadow-sm overflow-hidden">
                <h3 className="text-[11px] font-black text-slate-700 uppercase leading-tight w-[80%] z-10">{title}</h3>
                <div className="bg-[#d45652] text-white font-black text-[13px] px-5 py-1.5 rounded-full w-fit mt-auto mb-1 z-10 shadow-sm">{count}</div>
                <div className="absolute bottom-0 right-0 w-[70%] h-[75%] flex items-end justify-end pointer-events-none">
                    <div className="w-[120%] h-[120%] bg-[#fcf2f4] rounded-tl-full absolute bottom-[-20%] right-[-20%] z-0"></div>
                    <img src={imgSrc} className="relative z-10 object-contain h-full max-h-[90px] mr-1.5 mb-1.5" alt={title} />
                </div>
            </div>
        );

        const safeLocalStorage = {
            getItem: (key) => { try { return localStorage.getItem(key); } catch (e) { return null; } },
            setItem: (key, value) => { try { localStorage.setItem(key, value); } catch (e) { } },
            removeItem: (key) => { try { localStorage.removeItem(key); } catch (e) { } }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCAxRX_R0KSFsDdU3oUmQgG8JwYZ6edg4k",
            authDomain: "poshanpro-7816d.firebaseapp.com",
            projectId: "poshanpro-7816d",
            storageBucket: "poshanpro-7816d.firebasestorage.app",
            messagingSenderId: "454892989088",
            appId: "1:454892989088:web:6b6c2b03691c7f424a37c5",
            measurementId: "G-9PK4W4424C"
        };

        let auth, db;
        try {
            if (typeof firebase !== 'undefined') {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                auth = firebase.auth(); db = firebase.firestore();
                auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            }
        } catch (e) { }

        const appId = "poshan-pro-restore-v1";

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [isGuest, setIsGuest] = useState(false);
            const [members, setMembers] = useState([]);
            const [viewingHead, setViewingHead] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const fileInputRef = useRef(null);
            const [refreshTick, setRefreshTick] = useState(0);

            const [loginTab, setLoginTab] = useState('userpass'); 
            const [isSignUp, setIsSignUp] = useState(false); 
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [isBtnLoading, setIsBtnLoading] = useState(false);
            const [confirmResult, setConfirmResult] = useState(null);

            const initialForm = {
                firstName: '', lastName: '', gender: 'Male', birthDate: '', 
                mobile: '', aadhaar: '', photoURL: '', 
                poribarNo: '', relationToHead: 'Self', isFamilyHead: false, headId: ''
            };
            const [formData, setFormData] = useState(initialForm);

            useEffect(() => {
                if (!auth) { setIsGuest(true); setView('dashboard'); return; }
                auth.getRedirectResult().then(res => {
                    if (res && res.user) { setUser(res.user); setIsGuest(false); setView('dashboard'); }
                }).catch(e => {});

                const unsub = auth.onAuthStateChanged(u => {
                    if (u) { 
                        setUser(u); 
                        setIsGuest(false); 
                        setView('dashboard'); 
                    } else {
                        if (safeLocalStorage.getItem('poshan_is_guest') === 'true') { 
                            setIsGuest(true); 
                            setView('dashboard'); 
                        } else { 
                            setView('login'); 
                        }
                    }
                }, err => { setView('login'); });
                return () => { if (unsub) unsub(); };
            }, []);

            const loadLocalDataFallback = () => {
                const cached = safeLocalStorage.getItem('poshan_local_registry_members');
                if (cached) { try { setMembers(JSON.parse(cached)); } catch(e) { setMembers([]); } } else { setMembers([]); }
            };

            const saveLocalData = (newMembers) => {
                safeLocalStorage.setItem('poshan_local_registry_members', JSON.stringify(newMembers));
                setMembers(newMembers);
            };

            useEffect(() => {
                if (user && !isGuest && db) {
                    try {
                        const col = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('members');
                        return col.onSnapshot(snap => { 
                            const remoteData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                            setMembers(remoteData);
                            safeLocalStorage.setItem('poshan_local_registry_members', JSON.stringify(remoteData));
                        }, err => { 
                            loadLocalDataFallback(); 
                        });
                    } catch(e) { 
                        loadLocalDataFallback(); 
                    }
                } else { 
                    loadLocalDataFallback(); 
                }
            }, [user, isGuest, refreshTick]);

            useEffect(() => {
                if (viewingHead) { const freshHead = members.find(m => m.id === viewingHead.id); if (freshHead) setViewingHead(freshHead); }
            }, [members]);

            const handleUserPassAuth = async (e) => {
                e.preventDefault();
                if (!username.trim() || password.length < 6 || isBtnLoading || !auth) return;
                setIsBtnLoading(true);
                const email = username.trim().toLowerCase().includes('@') ? username.trim().toLowerCase() : `${username.trim().toLowerCase()}@poshanpro.com`;
                try {
                    if (isSignUp) { await auth.createUserWithEmailAndPassword(email, password); alert("Account Registry Success!"); } else { await auth.signInWithEmailAndPassword(email, password); }
                    setIsGuest(false);
                } catch (err) { alert("Error: " + err.message); } finally { setIsBtnLoading(false); }
            };

            const handleGoogleLogin = async () => {
                if (!auth || isBtnLoading) return; setIsBtnLoading(true);
                try { await auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); } catch (e) { setIsBtnLoading(false); }
            };

            const sendOTP = async () => {
                if (!auth || phone.length < 10 || isBtnLoading) return; setIsBtnLoading(true);
                try {
                    if (window.recaptchaVerifier) window.recaptchaVerifier.clear();
                    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
                    const result = await auth.signInWithPhoneNumber("+91" + phone, window.recaptchaVerifier);
                    setConfirmResult(result); setOtpSent(true);
                } catch (e) { alert("OTP Error."); } finally { setIsBtnLoading(false); }
            };

            const verifyOTP = async () => {
                if (otp.length < 6 || isBtnLoading) return; setIsBtnLoading(true);
                try { await confirmResult.confirm(otp); setIsGuest(false); } catch (e) { alert("Invalid Code!"); } finally { setIsBtnLoading(false); }
            };

            const skipLogin = () => { safeLocalStorage.setItem('poshan_is_guest', 'true'); setIsGuest(true); setView('dashboard'); };
            const handleLogout = () => {
                if (confirm("Logout?")) {
                    if (auth) auth.signOut().catch(e => {});
                    safeLocalStorage.removeItem('poshan_is_guest'); 
                    setIsGuest(false); 
                    setUser(null); 
                    setView('login');
                }
            };

            // EXACT COLORS FOR STATS FROM SCREENSHOT
            const stats = useMemo(() => [
                { l: 'FAMILIES', v: members.filter(x => x.isFamilyHead).length, bgLeft: 'bg-[#faa000]', bgRight: 'bg-[#f4b938]', img: 'assets/p.png' },
                { l: 'MEMBERS', v: members.length, bgLeft: 'bg-[#cbdcf6]', bgRight: 'bg-[#dbe5f7]', img: 'assets/fa.png' },
                { l: 'FEMALE', v: members.filter(x => x.gender === 'Female').length, bgLeft: 'bg-[#fbd8df]', bgRight: 'bg-[#fae1e6]', img: 'assets/f.png' },
                { l: 'MALE', v: members.filter(x => x.gender === 'Male').length, bgLeft: 'bg-[#abddf5]', bgRight: 'bg-[#c1ebfa]', img: 'assets/m.png' },
                { l: 'GIRL', v: members.filter(x => x.gender === 'Girl').length, bgLeft: 'bg-[#f7c6db]', bgRight: 'bg-[#fad0e4]', img: 'assets/g.png' },
                { l: 'BOY', v: members.filter(x => x.gender === 'Boy').length, bgLeft: 'bg-[#8bf1ef]', bgRight: 'bg-[#abf7f6]', img: 'assets/b.png' }
            ], [members]);

            const ageDisplay = useMemo(() => {
                if (!formData.birthDate || formData.birthDate.length < 10) return '';
                const parts = formData.birthDate.split('/'); if (parts.length !== 3) return '';
                const [d, m, y] = parts.map(Number); const bDate = new Date(y, m-1, d); const today = new Date();
                if (isNaN(bDate.getTime())) return '';
                let years = today.getFullYear() - bDate.getFullYear(); let months = today.getMonth() - bDate.getMonth();
                if (months < 0 || (months === 0 && today.getDate() < bDate.getDate())) { years--; months += 12; }
                return `${years.toString().padStart(2, '0')}-${months.toString().padStart(2, '0')}`;
            }, [formData.birthDate]);

            const relationOptions = useMemo(() => {
                if (!viewingHead) return ['Wife', 'Husband', 'Boy', 'Girl', 'Mother', 'Father', 'Mother in Law', 'Father in Law', 'Other'];
                let rawList = viewingHead.gender === 'Male' ? 
                    ['Wife', 'Boy', 'Girl', 'Mother', 'Father', 'Mother in Law', 'Father in Law', 'Other'] : 
                    ['Husband', 'Boy', 'Girl', 'Mother', 'Father', 'Mother in Law', 'Father in Law', 'Other'];
                const houseRels = members.filter(m => m.headId === viewingHead.id && !m.isFamilyHead).map(m => m.relationToHead);
                return rawList.filter(r => {
                    const singles = ['Wife', 'Husband', 'Mother', 'Father', 'Mother in Law', 'Father in Law'];
                    if (singles.includes(r) && houseRels.includes(r)) return false; return true;
                });
            }, [viewingHead, members]);

            const globalSearchResults = useMemo(() => {
                if (!searchTerm.trim()) return [];
                const query = searchTerm.toLowerCase().trim();
                return members.filter(m => `${m.firstName} ${m.lastName}`.toLowerCase().includes(query) || m.poribarNo?.toLowerCase().includes(query));
            }, [searchTerm, members]);

            const handleSave = async () => {
                if (isSaving) return; 
                setIsSaving(true);
                const data = { ...formData, age: ageDisplay, updatedAt: Date.now() };

                if (user && !isGuest && db) {
                    try {
                        const col = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('members');
                        if (editingId) { 
                            await col.doc(editingId).update(data); 
                        } else { 
                            await col.add({...data, createdAt: Date.now()}); 
                        }
                        
                        const wasHead = data.isFamilyHead;
                        setEditingId(null); 
                        setFormData(initialForm); 
                        setIsSaving(false);
                        
                        if (wasHead) setView('addHeadDashboard'); else setView('household');
                    } catch (e) { 
                        alert("Database error. Local saved."); 
                        setIsSaving(false);
                    }
                } else {
                    let localMembers = [...members];
                    if (editingId) { localMembers = localMembers.map(m => m.id === editingId ? {...m, ...data} : m); } 
                    else { localMembers.push({...data, id: 'local-' + Date.now(), createdAt: Date.now()}); }
                    saveLocalData(localMembers); 
                    
                    const wasHead = data.isFamilyHead;
                    setEditingId(null); 
                    setFormData(initialForm);
                    setIsSaving(false);
                    
                    if (wasHead) setView('addHeadDashboard'); else setView('household');
                }
            };

            const handleDeleteFamily = async (headId) => {
                if (!confirm("Delete family household?")) return;
                if (!isGuest && user && db) {
                    const toDelete = members.filter(m => m.id === headId || m.headId === headId);
                    const batch = db.batch();
                    const dbCol = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('members');
                    toDelete.forEach(item => batch.delete(dbCol.doc(item.id))); await batch.commit();
                } else { saveLocalData(members.filter(m => m.id !== headId && m.headId !== headId)); }
                setView('addHeadDashboard');
            };

            const handleDeleteMember = async (targetId) => {
                if (!confirm("Delete member?")) return;
                if (!isGuest && user && db) { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('members').doc(targetId).delete(); } 
                else { saveLocalData(members.filter(m => m.id !== targetId)); }
            };

            const filteredHeads = members.filter(m => m.isFamilyHead).filter(h => `${h.firstName} ${h.lastName}`.toLowerCase().includes(searchTerm.toLowerCase()) || h.poribarNo?.includes(searchTerm));

            if (view === 'login') return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 animate-view">
                    <div className="w-full max-w-sm bg-white p-8 rounded-[48px] shadow-2xl text-center space-y-6 border-b-8 border-indigo-100 leading-none">
                        <div className="mx-auto w-16 h-16 bg-[#ac5ebd] text-white rounded-[22px] flex items-center justify-center shadow-xl rotate-3 text-2xl font-black italic">P</div>
                        <div>
                            <h2 className="text-2xl font-black italic tracking-tighter text-[#ac5ebd] uppercase">Poshan Pro</h2>
                            <p className="text-slate-400 text-[10px] font-bold uppercase mt-1 tracking-widest leading-none">Family Registry</p>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-2xl gap-1 text-[10px] font-bold">

                                                                (['Wife', 'Mother', 'Mother in Law'].includes(formData.relationToHead) && g === 'Male') ||
                                                                (['Husband', 'Father', 'Father in Law'].includes(formData.relationToHead) && g === 'Female')
                                                            );
                                                            const isActive = formData.gender === g;
                                                            return (
                                                                <button key={g} type="button" disabled={isLocked} onClick={() => setFormData({...formData, gender: g})} 
                                                                className={`flex-1 py-3.5 rounded-[12px] font-black text-[10px] uppercase transition-all ${isLocked ? 'opacity-20 cursor-not-allowed' : ''} ${isActive ? 'bg-[#a65ebd] text-white border border-slate-600 shadow-md' : 'text-[#94a3b8] bg-transparent border border-transparent'}`}>
                                                                    {g}
                                                                </button>
                                                            );
                                                        })
                                                    )}
                                                </div>
                                            </div>
                                            <div className="relative">
                                                <label className="text-[10px] font-black italic text-slate-400 uppercase tracking-widest block mb-2">BIRTH DATE *</label>
                                                <input placeholder="DD/MM/YYYY" className="w-full p-4 border-[1.5px] border-[#94a3b8] rounded-[16px] font-bold shadow-sm outline-none placeholder-slate-400 text-slate-700" value={formData.birthDate} onChange={e => {
                                                        let val = e.target.value.replace(/\D/g, ''); let len = val.length;
                                                        if (len >= 2) { let dd = parseInt(val.slice(0, 2)); if (dd > 31 || dd === 0) return; }
                                                        if (len >= 4) { let mm = parseInt(val.slice(2, 4)); if (mm > 12 || mm === 0) return; }
                                                        if (len === 8) { let yyyy = parseInt(val.slice(4, 8)); if (yyyy > 2026) return; }
                                                        if (len > 8) val = val.slice(0, 8);
                                                        let formatted = len <= 2 ? val : len <= 4 ? `${val.slice(0, 2)}/${val.slice(2)}` : `${val.slice(0, 2)}/${val.slice(2, 4)}/${val.slice(4, 8)}`;
                                                        setFormData({...formData, birthDate: formatted});
                                                    }} inputMode="numeric" maxLength={10} />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black italic text-slate-400 uppercase tracking-widest block mb-2">MOBILE NO</label>
                                            <div className="relative">
                                                <input className="w-full p-4 pr-12 border-[1.5px] border-[#94a3b8] rounded-[16px] font-bold outline-none shadow-sm text-slate-700" value={formData.mobile} onChange={e => setFormData({...formData, mobile: e.target.value.replace(/\D/g,'')})} maxLength={10} inputMode="numeric" />
                                                {formData.mobile.length === 10 && (
                                                    <div className="absolute right-4 top-1/2 -translate-y-1/2">
                                                        <Icons.CheckCircle s={22} />
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black italic text-slate-400 uppercase tracking-widest block mb-2">AADHAAR NO*</label>
                                            <div className="relative">
                                                <input className="w-full p-4 pr-12 border-[1.5px] border-[#94a3b8] rounded-[16px] font-bold outline-none shadow-sm text-slate-700" value={formData.aadhaar} onChange={e => setFormData({...formData, aadhaar: e.target.value.replace(/\D/g,'')})} maxLength={12} inputMode="numeric" />
                                                {formData.aadhaar.length === 12 && (
                                                    <div className="absolute right-4 top-1/2 -translate-y-1/2">
                                                        <Icons.CheckCircle s={22} />
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={handleSave} disabled={isSaving} className="w-full py-[18px] bg-[#ef5f8b] text-white rounded-full font-black italic text-[22px] shadow-lg active:scale-95 border-[3px] border-[#312e81] mt-2 uppercase tracking-widest transition-all leading-none drop-shadow-md">
                                        {isSaving ? "SYNCING..." : "SAVE & SYNC"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ======================================================== */}
                        {/* HOUSEHOLD VIEW                                           */}
                        {/* ======================================================== */}
                        {view === 'household' && viewingHead && (
                            <div className="min-h-screen bg-[#fde1e9] animate-view pb-20 -mt-6">
                                <div className="bg-[#a65ebd] rounded-b-[24px] pt-8 pb-8 px-4 shadow-sm relative z-10">
                                    <div className="flex justify-between items-center mb-1">
                                        <button onClick={() => setView('addHeadDashboard')} className="border-[1.5px] border-white/60 p-2 rounded-[10px] text-white active:scale-75 transition-transform bg-transparent">
                                            <Icons.CurvedBack />
                                        </button>
                                        <h1 className="text-white font-black italic uppercase text-[17px] tracking-widest leading-none text-center flex-1 drop-shadow-sm">
                                            HEAD FAMILY DETAILS
                                        </h1>
                                        <button onClick={() => setRefreshTick(t => t + 1)} className="border-[1.5px] border-white/60 p-2 rounded-[10px] text-white active:bg-white/20 transition-colors bg-transparent">
                                            <Icons.Refresh s={20} />
                                        </button>
                                    </div>
                                </div>

                                <div className="p-4 space-y-6">
                                    <div className="bg-[#9d5baf] p-4 rounded-[28px] shadow-md relative">
                                        <div className="flex justify-between items-start mb-4">
                                            <span className="bg-[#f2eff4] text-[#ef5f8b] text-[10px] font-black italic px-4 py-1.5 rounded-full shadow-sm">
                                                Head Profile
                                            </span>
                                            <span className="bg-[#d49bb4] border-[1.5px] border-black text-black text-[11px] font-black px-4 py-1.5 rounded-full tracking-widest">
                                                ID: {viewingHead.poribarNo || '1'}
                                            </span>
                                        </div>

                                        <div className="flex gap-4 items-center">
                                            <div className="w-[90px] h-[90px] rounded-[24px] border-[3px] border-[#293260] bg-white overflow-hidden shrink-0 flex items-center justify-center shadow-sm">
                                                <img src={viewingHead.photoURL || "https://cdn-icons-png.flaticon.com/512/3063/3063822.png"} className="w-[95%] h-[95%] rounded-[18px] object-cover bg-slate-100" />
                                            </div>
                                            <div className="flex flex-col gap-2.5">
                                                <div className="bg-white/20 px-3.5 py-1.5 rounded-[8px] inline-block w-fit shadow-sm">
                                                    <h3 className="text-[17px] font-black uppercase text-white leading-none tracking-wide">{viewingHead.firstName} {viewingHead.lastName}</h3>
                                                </div>
                                                <div className="bg-white/20 px-3.5 py-1.5 rounded-[8px] inline-block w-fit shadow-sm">
                                                    <p className="text-[11px] font-black italic text-white uppercase leading-none tracking-widest">
                                                        {viewingHead.age ? (viewingHead.age.includes('-') ? `${viewingHead.age.split('-')[0]}Y - ${viewingHead.age.split('-')[1]}M` : viewingHead.age) : '00Y - 00M'}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex justify-end gap-3 mt-5">
                                            <button onClick={() => {setEditingId(viewingHead.id); setFormData(viewingHead); setView('form');}} className="bg-white border-[1.5px] border-black text-[#4f46e5] px-5 py-2.5 rounded-full font-black uppercase text-[12px] shadow-sm active:scale-95 transition-transform tracking-wider">
                                                EDIT PROFILE
                                            </button>
                                            <button onClick={() => handleDeleteFamily(viewingHead.id)} className="bg-[#ef5f8b] w-[42px] h-[42px] flex items-center justify-center rounded-[12px] text-white shadow-sm active:scale-95 transition-all">
                                                <Icons.Trash />
                                            </button>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        {members.filter(m => m.headId === viewingHead.id && !m.isFamilyHead).map(m => (
                                            <div key={m.id} className="bg-white p-4 rounded-[32px] border-[1.5px] border-[#ffb3c6] flex items-center gap-4 shadow-sm active:scale-95 transition-all">
                                                <img src={m.photoURL || "https://cdn-icons-png.flaticon.com/512/3063/3063822.png"} className="w-14 h-14 rounded-2xl object-cover border" />
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2 mb-1.5">
                                                        <p className="text-[10px] font-black text-[#ef5f8b] uppercase italic leading-none tracking-widest">{m.relationToHead}</p>
                                                        {m.mobile && ( <a href={`tel:${m.mobile}`} className="p-1 bg-[#fde1e9] text-[#ef5f8b] rounded-full flex items-center justify-center active:scale-75"><Icons.CallLogo s={10} /></a> )}
                                                    </div>
                                                    <h5 className="font-black uppercase text-base leading-none text-[#222222] truncate">{m.firstName} {m.lastName}</h5>
                                                    <p className="text-[10px] font-bold text-slate-500 mt-1.5 uppercase tracking-tighter leading-none">{m.age} • {m.gender}</p>
                                                </div>
                                                <div className="flex items-center gap-1.5 leading-none">
                                                    <button onClick={() => {setEditingId(m.id); setFormData(m); setView('form');}} className="p-3 bg-indigo-50 text-indigo-400 rounded-2xl active:text-indigo-600 transition-colors leading-none"><Icons.Edit /></button>
                                                    <button onClick={() => handleDeleteMember(m.id)} className="p-3 bg-rose-50 text-rose-400 rounded-2xl active:text-rose-600 transition-colors leading-none"><Icons.Trash /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <button onClick={() => setView('selectRelation')} className="w-full border-[2px] border-dashed border-[#ef5f8b] py-14 px-6 rounded-[32px] flex flex-col items-center justify-center gap-4 bg-transparent active:bg-white/20 transition-all text-[#ef5f8b]">
                                        <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm border-[1px] border-[#ef5f8b]/20">
                                            <Icons.Plus s={32} className="text-[#ef5f8b]" /> 
                                        </div>
                                        <span className="text-[12px] font-black uppercase italic tracking-widest text-[#ef5f8b] drop-shadow-sm">ADD MEMBER TO HOUSEHOLD</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ======================================================== */}
                        {/* SELECT RELATION VIEW                                     */}
                        {/* ======================================================== */}
                        {view === 'selectRelation' && viewingHead && (
                            <div className="min-h-screen bg-[#fde1e9] animate-view pb-20 -mt-6">
                                <div className="bg-[#a65ebd] rounded-b-[32px] pt-12 pb-8 px-4 shadow-sm relative z-10 flex items-center justify-center">
                                    <button onClick={() => setView('household')} className="absolute left-4 border-[1.5px] border-white/60 p-2 rounded-[10px] text-white active:scale-75 transition-transform bg-transparent">
                                        <Icons.CurvedBack />
                                    </button>
                                    <h1 className="text-white font-black italic uppercase text-[17px] tracking-widest leading-none drop-shadow-sm text-center mt-1">
                                        SELECT RELATION TO HEAD
                                    </h1>
                                </div>

                                <div className="p-5 mt-2">
                                    <div className="bg-[#d2bcc5] border-[2px] border-dashed border-[#dc8f9e] rounded-[32px] p-6 pb-8 shadow-sm">
                                        <div className="flex flex-wrap justify-between gap-y-5">
                                            {relationOptions.map((rel, index) => {
                                                const isOddLast = (relationOptions.length % 2 !== 0) && (index === relationOptions.length - 1);
                                                return (
                                                    <button key={rel} onClick={() => {
                                                            let targetGender = ['Wife', 'Mother', 'Mother in Law', 'Girl'].includes(rel) ? 'Girl' : 'Boy';
                                                            setFormData({ ...initialForm, headId: viewingHead.id, isFamilyHead: false, poribarNo: viewingHead.poribarNo, relationToHead: rel, gender: targetGender });
                                                            setView('form');
                                                        }} 
                                                        className={`bg-white border-[2px] border-[#a65ebd] rounded-full py-4 px-5 font-black uppercase tracking-wider text-slate-700 active:scale-95 transition-transform flex justify-between items-center shadow-sm ${isOddLast ? 'mx-auto w-[60%]' : 'w-[47%]'}`} >
                                                        <span className="text-[12px] ml-2">{rel}</span>
                                                        <div className="opacity-80 scale-90"><Icons.ChevronRight /></div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
